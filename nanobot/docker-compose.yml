version: '3.8'

services:
  galileo:
    build: .
    container_name: elab-galileo
    ports:
      - "8100:8100"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
