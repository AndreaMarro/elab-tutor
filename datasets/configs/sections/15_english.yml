id: english
name: "Inglese e Misto IT/EN"

templates:
  - input: "{frase}"
    intent: action
    needs_llm: false
    response: "@action_play"
    actions: ["[AZIONE:play]"]
    entities: []
    vars:
      frase:
        - start the simulation
        - run the circuit
        - play please
        - let's go
        - start it
        - can you start?
        - avvia please
        - fai start
        - dai let's go

  - input: "{frase}"
    intent: circuit
    needs_llm: false
    response: "@component_place"
    actions: ["[INTENT:{\"action\":\"place_and_wire\",\"components\":[{\"type\":\"led\"}],\"wires\":\"auto\"}]"]
    entities: [led]
    vars:
      frase:
        - put a LED
        - add an LED please
        - place a LED on the breadboard
        - metti a LED
        - aggiungi un LED please
        - I want a LED

  - input: "{frase}"
    intent: tutor
    needs_llm: true
    llm_hint: "Utente parla in inglese o misto. Rispondere in italiano semplice, accogliente."
    actions: []
    entities: []
    vars:
      frase:
        - what is a resistor?
        - how does a LED work?
        - cos'e' un circuit?
        - explain ohm's law
        - I don't understand
        - what is voltage?
        - how do I connect this?
        - why isn't it working?
        - help me please
        - spiegami how this works
        - il PWM what is it?
        - come funziona the breadboard?

  - input: "{frase}"
    intent: action
    needs_llm: false
    response: "@action_clearall"
    actions: ["[AZIONE:clearall]"]
    entities: []
    vars:
      frase: [clear all, clear everything, remove all, clean up, delete everything]

  - input: "{frase}"
    intent: code
    needs_llm: false
    response: "@action_compile"
    actions: ["[AZIONE:compile]"]
    entities: []
    vars:
      frase: [compile, build, compile the code, run the code, build it]

corruptions:
  typo_swap: 0.2
