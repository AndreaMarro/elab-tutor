id: voice
name: "Errori Voice-to-Text"

templates:
  - input: "{frase}"
    intent: action
    needs_llm: false
    response: "@action_play"
    actions: ["[AZIONE:play]"]
    entities: []
    vars:
      frase:
        - a via la simolazione
        - avia il circuìto
        - fallo partì re
        - a via la simulazzione
        - avvia la simula zione
        - avvia il circuì to

  - input: "{frase}"
    intent: circuit
    needs_llm: false
    response: "@component_place"
    actions: ["[INTENT:{\"action\":\"place_and_wire\",\"components\":[{\"type\":\"led\"}],\"wires\":\"auto\"}]"]
    entities: [led]
    vars:
      frase:
        - meti un letto
        - methi un let
        - metti un led sulla bretbord
        - aggiungi un letto sulla bread bord
        - meti una lucina
        - piazza un LED sulla bredboard

  - input: "{frase}"
    intent: circuit
    needs_llm: false
    response: "@component_place"
    actions: ["[INTENT:{\"action\":\"place_and_wire\",\"components\":[{\"type\":\"resistor\"}],\"wires\":\"auto\"}]"]
    entities: [resistor]
    vars:
      frase:
        - metti una risistenza
        - aggiungi una esistenza
        - meti un res
        - piazza la risistensa

  - input: "{frase}"
    intent: circuit
    needs_llm: false
    response: "@component_place"
    actions: ["[INTENT:{\"action\":\"place_and_wire\",\"components\":[{\"type\":\"buzzer-piezo\"}],\"wires\":\"auto\"}]"]
    entities: [buzzer-piezo]
    vars:
      frase:
        - metti un bazar
        - aggiungi il bazzer
        - meti un busser
        - piazza il bazaar

  - input: "{frase}"
    intent: tutor
    needs_llm: true
    llm_hint: "Messaggio con errori speech-to-text. Interpretare il significato reale e rispondere."
    actions: []
    entities: []
    vars:
      frase:
        - cosa la resistenza a cosa serve?
        - sperimento del led come funziona?
        - il con pila come si fa?
        - cose la corrente elet rica
        - come fun ziona il ci rcuito
        - spiega mi la legge di om

corruptions: {}
