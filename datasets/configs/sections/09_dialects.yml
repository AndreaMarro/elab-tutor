  - input: "{frase}"
    intent: tutor
    needs_llm: true
    llm_hint: "Studente parla in dialetto veneto."
    actions: []
    entities: []
    vars:
      frase: ["cossa xe na resistensa?", "spiegame par piaser", "no go capio"]

  # ── PIEMONTESE ──────────────
  - input: "{frase}"
    intent: action
    needs_llm: false
    response: "@action_play"
    actions: ["[AZIONE:play]"]
    entities: []
    vars:
      frase: ["falo parte' el circuit", "daje falo anda'", "avvialo neh"]
  - input: "{frase}"
    intent: circuit
    needs_llm: false
    response: "@component_place"
    actions: ["[INTENT:{\"action\":\"place_and_wire\",\"components\":[{\"type\":\"resistor\"}],\"wires\":\"auto\"}]"]
    entities: [resistor]
    vars:
      frase: ["buteme na resistensa", "metti na resistensa", "piassa la resistensa"]

  # ── SARDO ──────────────
  - input: "{frase}"
    intent: action
    needs_llm: false
    response: "@action_play"
    actions: ["[AZIONE:play]"]
    entities: []
