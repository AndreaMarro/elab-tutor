      frase: ["faghe partire su circuitu", "avvia totu", "faghe andare"]
  - input: "{frase}"
    intent: tutor
    needs_llm: true
    llm_hint: "Studente parla in sardo."
    actions: []
    entities: []
    vars:
      frase: ["itte est una resistenzia?", "ispiegami", "no apo cumpresu"]

  # ── PUGLIESE ──────────────
  - input: "{frase}"
    intent: action
    needs_llm: false
    response: "@action_play"
    actions: ["[AZIONE:play]"]
    entities: []
    vars:
      frase: ["falle parté u circuìte", "avvie tutte", "falle ji"]
  - input: "{frase}"
    intent: circuit
    needs_llm: false
    response: "@component_place"
    actions: ["[INTENT:{\"action\":\"place_and_wire\",\"components\":[{\"type\":\"led\"}],\"wires\":\"auto\"}]"]
    entities: [led]
    vars:
      frase: ["mette nu LED", "piazze na lucette", "ci mette u LED"]

corruptions: {}
