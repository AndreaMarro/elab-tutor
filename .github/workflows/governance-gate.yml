name: Governance Gate (blocca merge se PR viola docs/GOVERNANCE.md)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  governance-check:
    runs-on: ubuntu-latest
    name: Verify governance rules 0-5
    permissions:
      contents: read
      pull-requests: write
      issues: write
    env:
      PR_BRANCH: ${{ github.head_ref }}
      BASE_SHA: ${{ github.event.pull_request.base.sha }}

    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 22 required: Node 20 + npm ci has known bug where optional
          # native deps (lightningcss-linux-x64-gnu) silently skip install on
          # Linux runners, causing vite build to fail at postcss plugin load
          # AND vitest test collection to silently drop ~123 test files.
          # deploy.yml uses Node 22 successfully.
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm ci --include=optional

      - name: Regola 1 - Pre-Audit presente
        id: rule1
        run: |
          echo "Checking for docs/tasks/TASK-*-start.md..."
          # If branch is feature/* or test/*, TASK start file must exist
          case "$PR_BRANCH" in
            feature/*|test/*)
              FILES=$(find docs/tasks -name 'TASK-*-start.md' 2>/dev/null | wc -l)
              if [ "$FILES" -eq 0 ]; then
                echo "❌ Regola 1 FAIL: no docs/tasks/TASK-XXX-start.md"
                exit 1
              fi
              ;;
          esac
          echo "✅ Regola 1 PASS"

      - name: Regola 2 - TDD commit order
        id: rule2
        run: |
          # Verify at least one commit 'test(...)' precedes 'feat(...)' in PR
          git log --oneline "$BASE_SHA..HEAD"
          TEST_COMMITS=$(git log --oneline "$BASE_SHA..HEAD" | grep -E '^[a-f0-9]+ test\(' | wc -l)
          FEAT_COMMITS=$(git log --oneline "$BASE_SHA..HEAD" | grep -E '^[a-f0-9]+ feat\(' | wc -l)
          if [ "$FEAT_COMMITS" -gt 0 ] && [ "$TEST_COMMITS" -eq 0 ]; then
            echo "❌ Regola 2 FAIL: feat() commit without test() commit first"
            exit 1
          fi
          echo "✅ Regola 2 PASS (or no feat commits)"

      - name: Regola 3 - CoV 3/3 documented
        id: rule3
        run: |
          case "$PR_BRANCH" in
            feature/*|test/*)
              COV_FILES=$(find docs/reports -name 'TASK-*-cov.md' 2>/dev/null || true)
              if [ -z "$COV_FILES" ]; then
                echo "❌ Regola 3 FAIL: no docs/reports/TASK-XXX-cov.md"
                exit 1
              fi
              for f in $COV_FILES; do
                if ! grep -q "3/3 pass\|3/3 PASS" "$f"; then
                  echo "❌ Regola 3 FAIL: $f missing 3/3 pass"
                  exit 1
                fi
              done
              ;;
          esac
          echo "✅ Regola 3 PASS"

      - name: Regola 4 - Audit APPROVE presente
        id: rule4
        run: |
          case "$PR_BRANCH" in
            feature/*|test/*)
              AUDIT_FILES=$(find docs/audits -name 'PR-*-audit.md' -o -name 'TASK-*-audit.md' 2>/dev/null || true)
              if [ -z "$AUDIT_FILES" ]; then
                echo "⚠️ Regola 4 WARN: no audit file (Auditor Agent should create pre-merge)"
                exit 0
              fi
              if ! grep -l "Verdetto: APPROVE\|Verdetto: APPROVED" $AUDIT_FILES > /dev/null 2>&1; then
                echo "❌ Regola 4 FAIL: no APPROVE verdict found"
                exit 1
              fi
              ;;
          esac
          echo "✅ Regola 4 PASS"

      - name: Regola 5 - Docs aggiornate
        id: rule5
        run: |
          SRC_CHANGED=$(git diff --name-only "$BASE_SHA..HEAD" -- src/ supabase/ | wc -l)
          CHANGELOG_CHANGED=$(git diff --name-only "$BASE_SHA..HEAD" -- CHANGELOG.md | wc -l)
          if [ "$SRC_CHANGED" -gt 0 ] && [ "$CHANGELOG_CHANGED" -eq 0 ]; then
            echo "❌ Regola 5 FAIL: src/supabase changed but CHANGELOG.md not updated"
            exit 1
          fi
          echo "✅ Regola 5 PASS"

      - name: Regola 0 - No rewrite senza motivo documentato
        id: rule0
        run: |
          DELETED=$(git diff --name-only --diff-filter=D "$BASE_SHA..HEAD" | grep -E '\.(js|jsx|ts|tsx)$' | wc -l)
          if [ "$DELETED" -gt 5 ]; then
            DECISIONS_UPDATED=$(git diff --name-only "$BASE_SHA..HEAD" -- docs/decisions/REWRITE-* | wc -l)
            if [ "$DECISIONS_UPDATED" -eq 0 ]; then
              echo "⚠️ Regola 0 WARN: possible rewrite (5+ files deleted) senza docs/decisions/REWRITE-*"
              echo "Please document rewrite justification if intentional"
            fi
          fi
          echo "✅ Regola 0 PASS (or documented)"

      - name: Baseline regression check
        id: baseline
        run: |
          BASELINE=$(jq '.total' .test-count-baseline.json)
          npx vitest run --reporter=json > /tmp/vitest.json 2>&1 || true
          TESTS_NOW=$(jq '.numPassedTests' /tmp/vitest.json)
          if [ "$TESTS_NOW" -lt "$BASELINE" ]; then
            echo "❌ Baseline regression: $TESTS_NOW < $BASELINE"
            exit 1
          fi
          echo "✅ Baseline OK: $TESTS_NOW ≥ $BASELINE"

      - name: Build check
        id: build
        run: |
          npm run build
          echo "✅ Build OK"

      - name: Comment PR con status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const rule0 = '${{ steps.rule0.outcome }}';
            const rule1 = '${{ steps.rule1.outcome }}';
            const rule2 = '${{ steps.rule2.outcome }}';
            const rule3 = '${{ steps.rule3.outcome }}';
            const rule4 = '${{ steps.rule4.outcome }}';
            const rule5 = '${{ steps.rule5.outcome }}';
            const baseline = '${{ steps.baseline.outcome }}';
            const build = '${{ steps.build.outcome }}';
            const emoji = (s) => s === 'success' ? '✅' : '❌';
            const body = [
              '## 🛡️ Governance Gate Report',
              '',
              `- ${emoji(rule0)} Regola 0 (Riuso esistente)`,
              `- ${emoji(rule1)} Regola 1 (Pre-Audit)`,
              `- ${emoji(rule2)} Regola 2 (TDD)`,
              `- ${emoji(rule3)} Regola 3 (CoV 3/3)`,
              `- ${emoji(rule4)} Regola 4 (Audit APPROVE)`,
              `- ${emoji(rule5)} Regola 5 (Docs-as-code)`,
              `- ${emoji(baseline)} Baseline non regredito`,
              `- ${emoji(build)} Build OK`,
              '',
              'See `docs/GOVERNANCE.md` for rules.'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
