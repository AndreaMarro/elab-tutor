name: Routines Orchestrator (ELAB Tutor autonomous development)

# Esegue PDR in modo autonomo via GitHub Actions.
# Ogni job è una routine indipendente con schedule dedicato.
# Richiede secrets: ANTHROPIC_API_KEY + TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID

on:
  schedule:
    - cron: '15 */6 * * *'
    - cron: '0 */4 * * *'
    - cron: '30 */4 * * *'
    - cron: '45 */6 * * *'
    - cron: '0 */8 * * *'
    - cron: '*/30 * * * *'
    - cron: '7 * * * *'
    - cron: '0 18 * * 5'
  workflow_dispatch:
    inputs:
      routine:
        description: 'Routine to run manually'
        required: true
        type: choice
        options:
          - pdr1-unlim-core
          - pdr2-openclaw-infra
          - pdr3-vps-runpod
          - pdr4-lesson-reader
          - pdr-test-multiplier
          - pdr-stress-chaos
          - pdr-commercial
          - pdr-feedback
          - pdr-reality-check
          - regression-hunter
          - cost-tracker
          - auditor

jobs:
  determine-routine:
    runs-on: ubuntu-latest
    outputs:
      routine: ${{ steps.pick.outputs.routine }}
      prompt-file: ${{ steps.pick.outputs.prompt-file }}
      branch: ${{ steps.pick.outputs.branch }}
    env:
      SCHEDULE_CRON: ${{ github.event.schedule }}
      MANUAL_ROUTINE: ${{ inputs.routine }}
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - name: Pick routine based on trigger
        id: pick
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            ROUTINE="$MANUAL_ROUTINE"
          else
            case "$SCHEDULE_CRON" in
              '15 */6 * * *') ROUTINE='pdr3-vps-runpod' ;;
              '0 */4 * * *')  ROUTINE='pdr1-unlim-core' ;;
              '30 */4 * * *') ROUTINE='pdr2-openclaw-infra' ;;
              '45 */6 * * *') ROUTINE='pdr4-lesson-reader' ;;
              '0 */8 * * *')  ROUTINE='pdr-test-multiplier' ;;
              '*/30 * * * *') ROUTINE='regression-hunter' ;;
              '7 * * * *')    ROUTINE='cost-tracker' ;;
              '0 18 * * 5')   ROUTINE='pdr-stress-chaos' ;;
              *) ROUTINE='regression-hunter' ;;
            esac
          fi

          case "$ROUTINE" in
            pdr1-unlim-core)
              PROMPT_FILE='docs/plans/2026-04-18-pdr1-unlim-core-design.md'
              BRANCH='feature/unlim-core-v1'
              ;;
            pdr2-openclaw-infra)
              PROMPT_FILE='docs/plans/2026-04-18-pdr2-openclaw-infra-design.md'
              BRANCH='feature/openclaw-infra-v1'
              ;;
            pdr3-vps-runpod)
              PROMPT_FILE='docs/plans/2026-04-18-pdr3-vps-runpod-deploy-design.md'
              BRANCH='feature/vps-runpod-deploy-v1'
              ;;
            pdr4-lesson-reader)
              PROMPT_FILE='docs/plans/2026-04-18-pdr4-lesson-reader-design.md'
              BRANCH='feature/lesson-reader-v1'
              ;;
            pdr-test-multiplier)
              PROMPT_FILE='docs/plans/2026-04-18-pdr-test-multiplier-design.md'
              BRANCH='feature/test-multiplier-v1'
              ;;
            pdr-stress-chaos)
              PROMPT_FILE='docs/plans/2026-04-18-pdr-stress-chaos-design.md'
              BRANCH='test/stress-chaos-62h'
              ;;
            pdr-commercial)
              PROMPT_FILE='docs/plans/2026-04-18-pdr-commercial-pacchetti-design.md'
              BRANCH='feature/commercial-v1'
              ;;
            pdr-feedback)
              PROMPT_FILE='docs/plans/2026-04-18-pdr-feedback-research-design.md'
              BRANCH='feature/feedback-research-v1'
              ;;
            pdr-reality-check)
              PROMPT_FILE='docs/plans/2026-04-18-pdr-reality-check-design.md'
              BRANCH='test/reality-check-v1'
              ;;
            regression-hunter)
              PROMPT_FILE='docs/plans/2026-04-18-routine-regression-hunter-prompt.md'
              BRANCH='main'
              ;;
            cost-tracker)
              PROMPT_FILE='docs/plans/2026-04-18-routine-cost-tracker-prompt.md'
              BRANCH='main'
              ;;
            auditor)
              PROMPT_FILE='docs/plans/2026-04-18-routine-auditor-prompt.md'
              BRANCH='main'
              ;;
            *)
              PROMPT_FILE='docs/plans/2026-04-18-routine-regression-hunter-prompt.md'
              BRANCH='main'
              ;;
          esac

          {
            echo "routine=$ROUTINE"
            echo "prompt-file=$PROMPT_FILE"
            echo "branch=$BRANCH"
          } >> "$GITHUB_OUTPUT"

          echo "Selected routine: $ROUTINE"

  run-routine:
    needs: determine-routine
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    timeout-minutes: 45
    env:
      ROUTINE: ${{ needs.determine-routine.outputs.routine }}
      PROMPT_FILE: ${{ needs.determine-routine.outputs.prompt-file }}
      BRANCH: ${{ needs.determine-routine.outputs.branch }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Create/checkout working branch
        run: |
          if [ "$BRANCH" = "main" ]; then
            git checkout main
          else
            git checkout -B "$BRANCH"
            git pull origin "$BRANCH" 2>/dev/null || echo "New branch"
          fi

      - name: Verify PDR file exists
        run: |
          if [ ! -f "$PROMPT_FILE" ]; then
            echo "::error::PDR file not found: $PROMPT_FILE"
            exit 1
          fi

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: ${{ needs.determine-routine.outputs.prompt-file }}
          allowed_tools: 'Bash,Edit,Read,Write,Glob,Grep,WebSearch,WebFetch'
          model: 'claude-sonnet-4-6'
          max_turns: 30

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "TELEGRAM_BOT_TOKEN not set, skipping notification"
            exit 0
          fi

          if [ "$STATUS" = "success" ]; then
            EMOJI='OK'
          else
            EMOJI='FAIL'
          fi

          MESSAGE="$EMOJI Routine: $ROUTINE%0ABranch: $BRANCH%0AStatus: $STATUS%0A$RUN_URL"

          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${MESSAGE}" || true

      - name: Summary
        if: always()
        env:
          STATUS: ${{ job.status }}
        run: |
          {
            echo "## Routine ${ROUTINE}"
            echo "- Branch: ${BRANCH}"
            echo "- Status: ${STATUS}"
            echo "- Time: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_STEP_SUMMARY"
