# ============================================
# ELAB Tutor — Quality Gate (Anti-Regressione)
# Verifica ratchet: test count, coverage, bundle
# ============================================

name: Quality Gate

on:
  pull_request:
    branches: [main, develop]

jobs:
  quality-ratchet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 matches deploy.yml (Node 20 skips optional native deps).
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci --include=optional || npm install --include=optional
          # Same workaround as governance-gate: force rebuild platform-specific
          # native deps missed by `npm ci + setup-node cache`.
          npm rebuild lightningcss @tailwindcss/oxide 2>/dev/null || true

      - name: Run tests and capture count
        id: tests
        run: |
          # Use --reporter=json for reliable test count (not file count).
          # Previous regex '[0-9]+ passed | head -1' matched "Test Files N passed"
          # instead of "Tests M passed" and produced false-positive REGRESSION.
          npx vitest run --reporter=json > /tmp/vitest-output.json 2>&1 || true
          PASSED=$(jq -r '.numPassedTests // 0' /tmp/vitest-output.json 2>/dev/null || echo 0)
          FAILED=$(jq -r '.numFailedTests // 0' /tmp/vitest-output.json 2>/dev/null || echo 0)
          if [ "$PASSED" = "0" ] || [ -z "$PASSED" ]; then
            RAW=$(npx vitest run 2>&1 | tail -30)
            PASSED=$(echo "$RAW" | grep -oE 'Tests[[:space:]]+[0-9]+ passed' | grep -oE '[0-9]+' | head -1)
            FAILED=$(echo "$RAW" | grep -oE 'Tests[[:space:]]+[0-9]+ failed' | grep -oE '[0-9]+' | head -1)
          fi
          echo "passed=${PASSED:-0}" >> "$GITHUB_OUTPUT"
          echo "failed=${FAILED:-0}" >> "$GITHUB_OUTPUT"
          echo "Test passati: ${PASSED:-0}, falliti: ${FAILED:-0}"

      - name: Check test count ratchet
        env:
          TEST_PASSED: ${{ steps.tests.outputs.passed }}
        run: |
          CURRENT="${TEST_PASSED:-0}"
          BASELINE=$(jq -r '.total' .test-count-baseline.json)
          THRESHOLD=$(jq -r '.regression_threshold' .test-count-baseline.json)
          MIN_ALLOWED=$(echo "$BASELINE * (1 - $THRESHOLD)" | bc | cut -d. -f1)
          echo "Test attuali: $CURRENT | Baseline: $BASELINE | Minimo: $MIN_ALLOWED"
          if [ "$CURRENT" -lt "$MIN_ALLOWED" ]; then
            echo "::error::TEST REGRESSION! $CURRENT < $MIN_ALLOWED (baseline $BASELINE)"
            exit 1
          fi

      - name: Check zero test failures
        env:
          TEST_FAILED: ${{ steps.tests.outputs.failed }}
        run: |
          if [ "${TEST_FAILED:-0}" -gt "0" ]; then
            echo "::error::$TEST_FAILED test FALLITI. Fix obbligatorio."
            exit 1
          fi
          echo "Zero test falliti OK"

      - name: Build and check bundle size
        run: |
          npm run build
          TOTAL=$(du -sk dist/ | cut -f1)
          MAX_KB=$(jq -r '.bundle_max_kb' .test-count-baseline.json)
          echo "Bundle totale: ${TOTAL}KB (limite: ${MAX_KB}KB)"
          if [ "$TOTAL" -gt "$MAX_KB" ]; then
            echo "::error::BUNDLE REGRESSION! ${TOTAL}KB > ${MAX_KB}KB"
            exit 1
          fi
        env:
          VITE_N8N_AUTH_URL: ${{ secrets.VITE_N8N_AUTH_URL }}
          VITE_N8N_GDPR_URL: ${{ secrets.VITE_N8N_GDPR_URL }}
          VITE_N8N_LICENSE_URL: ${{ secrets.VITE_N8N_LICENSE_URL }}

      - name: Summary
        if: always()
        env:
          TEST_PASSED: ${{ steps.tests.outputs.passed }}
          TEST_FAILED: ${{ steps.tests.outputs.failed }}
        run: |
          echo "## Quality Gate Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test passed | ${TEST_PASSED:-0} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Test failed | ${TEST_FAILED:-0} |" >> "$GITHUB_STEP_SUMMARY"
