id: vol2-language-simplification
type: EDIT
priority: P1
title: "Semplifica linguaggio Vol2 — da accademico a 10-14 anni"
description: |
  PROBLEMA: I 18 lesson path di Vol2 usano linguaggio troppo tecnico per bambini 10-14 anni.
  Termini da ELIMINARE o SOSTITUIRE con analogie:

  | Termine tecnico | Sostituzione |
  |-----------------|-------------|
  | "Tau" | "tempo di scarica" |
  | "costante di tempo" | "quanto ci mette a scaricarsi" |
  | "Vf" o "tensione di soglia" | "la spinta minima per accendersi" |
  | "esponenziale" | "veloce all'inizio, poi sempre più lento" |
  | "partitore di tensione" | "divisore di corrente" o analogia rubinetto |
  | "curva esponenziale" | "come una palla che rimbalza sempre meno" |
  | "RC" (senza spiegazione) | "resistore + condensatore insieme" |
  | "pull-down" | "collegamento a terra" |
  | "collector-emitter" | "ingresso-uscita del sensore" |

  REGOLA: Se un termine è in vocabulary.allowed ma è troppo tecnico,
  SPOSTALO in vocabulary.forbidden e aggiungi la versione semplificata in allowed.

  PROCEDURA per OGNI file v2-*.json:
  1. Leggi il file
  2. Cerca i termini nella tabella sopra in TUTTI i campi di testo
  3. Sostituisci con la versione kid-friendly
  4. Aggiorna vocabulary.allowed e vocabulary.forbidden
  5. Verifica che class_hook e provocative_question NON usino termini forbidden
  6. Salva il file
  7. npm run build DEVE passare

