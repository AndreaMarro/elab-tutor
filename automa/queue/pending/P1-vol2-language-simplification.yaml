  PRINCIPIO ZERO: L'insegnante deve capire TUTTO senza preparazione.
  Se un termine richiede una laurea in ingegneria, NON deve stare nel lesson path.

  VERIFICA FINALE: grep per "Tau\|Vf\|esponenziale\|partitore\|pull-down\|collector"
  nei file v2-*.json — deve dare 0 risultati.
