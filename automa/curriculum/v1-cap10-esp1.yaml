teacher_briefing:
  before_class: >
    Preparazione: ogni gruppo ha 1 LED, 1 resistenza 1K ohm, 1 fotoresistenza (LDR),
    breadboard, batteria 9V. La fotoresistenza non ha polarita (si puo mettere in
    qualsiasi verso). Obiettivo: scoprire che esistono componenti che reagiscono
    all'ambiente — il circuito puo "sentire" la luce.
  during_class: >
    Prima di tutto: "Ricordate il potenziometro? Cambiava resistenza girando la
    manopola. Ora vi mostro un componente che cambia resistenza DA SOLO."
    Dai la fotoresistenza: "Cosa notate quando la coprite con la mano? E quando
    la illuminate con la torcia del telefono?" Falli misurare (se hanno multimetro)
    o osservare il LED che cambia.
  common_question: >
    "Come fa a sentire la luce?" -> Dentro la fotoresistenza c'e un materiale
    speciale che quando la luce lo colpisce, diventa piu facile per l'elettricita
    passare. E come una porta che si apre quando c'e il sole e si chiude quando
    e buio.

common_mistakes:
  - mistake: "Non vedono differenza di luminosita del LED"
    what_to_do: "Serve una stanza non troppo illuminata. Coprire completamente con la mano, poi illuminare con torcia telefono"
    analogy: null
  - mistake: "Mettono la fotoresistenza al posto sbagliato"
    what_to_do: "La fotoresistenza va in serie col LED, come una resistenza normale. Sostituisce il potenziometro dell'esperimento 9"
    analogy: "E come il potenziometro, ma la manopola e la luce stessa"
  - mistake: "Il LED e sempre spento o sempre acceso"
    what_to_do: "Controllare il valore della resistenza fissa — se troppo alto, il LED non si accende mai"
    analogy: null

analogies:
  fotoresistenza:
    analogy: "La fotoresistenza e come un guardiano che apre il cancello quando c'e luce e lo chiude quando e buio. Non hai bisogno di toccarlo — reagisce da solo all'ambiente."
    evidence: "Analogia agente autonomo per sensori, facilita transizione da componenti passivi ad attivi (Osborne & Freyberg 1985)"
  sensore_luce:
    analogy: "E il primo componente che 'sente' il mondo esterno! Come i tuoi occhi sentono la luce, la fotoresistenza sente la luce e cambia il circuito."
    evidence: "Analogia sensoriale corpo umano, supporta embodied cognition (Barsalou 2008)"

assessment_invisible:
  - "Se lo studente dice 'e come il potenziometro ma automatico' -> ha fatto il collegamento concettuale chiave"
  - "Se copre la LDR e nota il cambiamento -> apprendimento per scoperta funziona"
  - "Se chiede 'possiamo fare che si accende AL BUIO?' -> pensiero inverso, pronto per esp 2 (invertire)"
  - "Se propone di combinare pot + LDR -> pensiero creativo, pronto per esp 5"
