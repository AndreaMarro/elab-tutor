# Curriculum YAML — v1-cap10-esp1
# "LED controllato dalla luce"

experiment_id: v1-cap10-esp1
volume: 1
chapter: 10
title: "LED controllato dalla luce"

prerequisites:
  - v1-cap6-esp1  # Sa accendere un LED
  - v1-cap6-esp3  # Sa usare una resistenza
  - v1-cap9-esp1  # Conosce il potenziometro (resistenza variabile)

concepts_introduced:
  - fotoresistenza
  - LDR
  - sensore_luce
  - resistenza_che_cambia_da_sola
  - partitore_intuitivo

vocabulary_level: v1-cap10
allowed_terms:
  - LED
  - resistenza
  - ohm
  - corrente
  - circuito
  - batteria
  - filo
  - breadboard
  - pulsante
  - potenziometro
  - fotoresistenza
  - luce
  - buio
  - sensore
  - luminosita
  - automatico
  - cambiare
  - reagire
forbidden_terms:
  - condensatore
  - MOSFET
  - Arduino
  - codice
  - programma
  - digitale
  - analogico
  - analogRead
  - tensione
  - volt
  - partitore_di_tensione
