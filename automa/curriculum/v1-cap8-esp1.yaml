# Curriculum YAML — v1-cap8-esp1
# "LED con pulsante"

experiment_id: v1-cap8-esp1
volume: 1
chapter: 8
title: "LED con pulsante"

prerequisites:
  - v1-cap6-esp1  # Sa accendere un LED
  - v1-cap6-esp3  # Sa usare una resistenza
  - v1-cap7-esp1  # Sa collegare un LED RGB

concepts_introduced:
  - pulsante
  - circuito_aperto_chiuso
  - interruttore_momentaneo
  - normalmente_aperto

vocabulary_level: v1-cap8
allowed_terms:
  - LED
  - resistenza
  - ohm
  - corrente
  - circuito
  - batteria
  - filo
  - breadboard
  - pulsante
  - premere
  - rilasciare
  - acceso
  - spento
  - aperto
  - chiuso
  - interrompere
  - collegare
forbidden_terms:
  - potenziometro
  - parallelo
  - serie
  - condensatore
  - MOSFET
  - Arduino
  - codice
  - programma
